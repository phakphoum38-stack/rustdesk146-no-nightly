name: Full Flutter CI

on:
  workflow_dispatch:

  pull_request:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"

  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  run-ci:
    name: Build RustDesk Multi-platform
    uses: ./.github/workflows/flutter-build.yml
    permissions:
      contents: write
      actions: read
    with:
      upload-artifact: true
      upload-tag: nightly
    secrets: inherit
