name: Full Flutter CI

on:
  workflow_dispatch:

  pull_request:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"

  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  run-ci:
    name: Flutter Multi-platform Build
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
    secrets: inherit
