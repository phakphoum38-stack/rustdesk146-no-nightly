name: Build Installers for Supported Platforms

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag that will receive the installers
        required: true
        default: v1.4.9-custom
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'

permissions:
  contents: write
  actions: read

concurrency:
  group: multiplatform-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-installers:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: ${{ inputs.release_tag || github.ref_name }}
