name: Build and Deploy Web Portal

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing prerelease tag that receives the web archive
        required: true
        default: v1.4.9-custom
        type: string
      deploy_pages:
        description: Deploy the built site to GitHub Pages
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: write
  id-token: write
  pages: write

concurrency:
  group: rustdesk-web-pages
  cancel-in-progress: true

env:
  VERSION: "1.4.9"

jobs:
  build:
    name: Build web portal and remote lab
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Audit production dependencies
        working-directory: web
        run: npm audit --omit=dev --audit-level=high

      - name: Build production site
        working-directory: web
        run: npm run build

      - name: Package site
        shell: bash
        run: |
          cp web/README.md web/dist/README.md
          tar -czf "web/rustdesk-${VERSION}-web.tar.gz" -C web/dist .
          sha256sum "web/rustdesk-${VERSION}-web.tar.gz"

      - name: Publish web archive to prerelease
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          prerelease: true
          tag_name: ${{ inputs.release_tag }}
          files: web/rustdesk-${{ env.VERSION }}-web.tar.gz

      - name: Upload web site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-${{ env.VERSION }}-web-site
          path: web/dist/

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist/

  deploy:
    name: Deploy GitHub Pages
    if: ${{ inputs.deploy_pages }}
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
