name: Build iOS

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: App version shown to users
        required: true
        default: "1.4.5"
        type: string
      build_number:
        description: Internal iOS build number
        required: true
        default: "63"
        type: string

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_TOOLCHAIN: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-rustdesk-ios:

  name: Build RustDesk iOS IPA

  runs-on: macos-14

  needs:

    - generate-bridge

  steps:

    - name: Export GitHub Actions cache variables

      uses: actions/github-script@v7

      with:

        script: |

          core.exportVariable(

            'ACTIONS_CACHE_URL',

            process.env.ACTIONS_CACHE_URL || ''

          );

          core.exportVariable(

            'ACTIONS_RUNTIME_TOKEN',

            process.env.ACTIONS_RUNTIME_TOKEN || ''

          );

    - name: Checkout source code

      uses: actions/checkout@v4

      with:

        submodules: recursive

    - name: Install dependencies

      run: |

        brew install nasm yasm

        pod --version

        xcodebuild -version

    - name: Install Flutter

      uses: subosito/flutter-action@v2

      with:

        channel: stable

        flutter-version: ${{ env.FLUTTER_VERSION }}

        cache: true

    - name: Patch Flutter

      shell: bash

      run: |

        FLUTTER_ROOT="$(dirname "$(dirname "$(which flutter)")")"

        if [[ "${{ env.FLUTTER_VERSION }}" == "3.24.5" ]]; then

          cd "$FLUTTER_ROOT"

          git apply \

            "${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"

        fi

    - name: Install Rust toolchain

      uses: dtolnay/rust-toolchain@v1

      with:

        toolchain: ${{ env.RUST_VERSION }}

        targets: aarch64-apple-ios

        components: rustfmt

    - name: Restore Rust cache

      uses: Swatinem/rust-cache@v2

      with:

        prefix-key: rustdesk-ios

        key: aarch64-apple-ios

    - name: Setup vcpkg

      uses: lukka/run-vcpkg@v11

      with:

        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

        doNotCache: false

    - name: Install iOS vcpkg dependencies

      shell: bash

      run: |

        if ! "$VCPKG_ROOT/vcpkg" install \

          --triplet arm64-ios \

          --x-install-root="$VCPKG_ROOT/installed"; then

          find "$VCPKG_ROOT" -name "*.log" -print -exec cat {} \;

          exit 1

        fi

    - name: Restore bridge files

      uses: actions/download-artifact@v4

      with:

        name: bridge-artifact

        path: ./

    - name: Build Rust static library

      shell: bash

      run: |

        rustup target add aarch64-apple-ios

        cargo build \

          --features flutter,hwcodec \

          --release \

          --target aarch64-apple-ios \

          --lib

        test -f \

          target/aarch64-apple-ios/release/liblibrustdesk.a

    - name: Copy Rust library into iOS project

      shell: bash

      run: |

        mkdir -p flutter/ios/Runner

        cp \

          target/aarch64-apple-ios/release/liblibrustdesk.a \

          flutter/ios/Runner/liblibrustdesk.a

        ls -lh flutter/ios/Runner/liblibrustdesk.a

    - name: Install Flutter packages

      working-directory: flutter

      run: |

        flutter doctor -v

        flutter pub get

        flutter precache --ios

    - name: Install CocoaPods

      working-directory: flutter/ios

      shell: bash

      run: |

        pod install --repo-update

    - name: Build unsigned IPA

      working-directory: flutter

      shell: bash

      run: |

        flutter build ipa \

          --release \

          --no-codesign

    - name: Show iOS output

      shell: bash

      run: |

        find flutter/build/ios \

          -maxdepth 4 \

          -type f \

          -print

    - name: Upload Rust iOS library

      uses: actions/upload-artifact@v4

      with:

        name: rustdesk-ios-static-library

        path: |

          target/aarch64-apple-ios/release/liblibrustdesk.a

        if-no-files-found: error

    - name: Upload unsigned IPA

      uses: actions/upload-artifact@v4

      with:

        name: rustdesk-${{ env.VERSION }}-ios-unsigned

        path: |

          flutter/build/ios/ipa/*.ipa

        if-no-files-found: error

        retention-days: 14

    - name: Publish unsigned IPA

      if: env.UPLOAD_ARTIFACT == 'true'

      uses: softprops/action-gh-release@v2

      with:

        prerelease: true

        tag_name: ${{ env.TAG_NAME }}

        files: |

          flutter/build/ios/ipa/*.ipa
