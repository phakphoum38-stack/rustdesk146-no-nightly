name: Build RustDesk iOS IPA

on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        description: Upload IPA to GitHub Actions Artifacts
        required: false
        type: boolean
        default: true

      publish-release:
        description: Publish IPA to GitHub Release
        required: false
        type: boolean
        default: false

      upload-tag:
        description: GitHub release tag
        required: false
        type: string
        default: nightly-ios

  push:
    branches:
      - master
      - main
    paths:
      - "flutter/**"
      - "src/**"
      - "libs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "vcpkg.json"
      - ".github/workflows/build-ios.yml"
      - ".github/workflows/bridge.yml"
      - ".github/patches/**"

permissions:
  contents: write
  actions: read

concurrency:
  group: rustdesk-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  VERSION: "1.4.9"

  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

  IOS_RUST_TARGET: "aarch64-apple-ios"
  IOS_VCPKG_TRIPLET: "arm64-ios"

  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  generate-bridge:
    name: Generate Flutter Rust Bridge
    uses: ./.github/workflows/bridge.yml
    secrets: inherit

  build-rustdesk-ios:
    name: Build RustDesk iOS unsigned IPA
    runs-on: macos-14

    needs:
      - generate-bridge

    timeout-minutes: 180

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable(
              'ACTIONS_CACHE_URL',
              process.env.ACTIONS_CACHE_URL || ''
            );

            core.exportVariable(
              'ACTIONS_RUNTIME_TOKEN',
              process.env.ACTIONS_RUNTIME_TOKEN || ''
            );

      - name: Show runner information
        shell: bash
        run: |
          set -euxo pipefail

          sw_vers
          uname -a
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          python3 --version

      - name: Install macOS dependencies
        shell: bash
        run: |
          set -euxo pipefail

          brew update

          brew install \
            nasm \
            yasm \
            pkg-config \
            cmake \
            ninja

          nasm -v
          yasm --version
          cmake --version
          ninja --version
          pod --version

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Show Flutter information
        shell: bash
        run: |
          set -euxo pipefail

          flutter --version
          flutter doctor -v
          flutter config --enable-ios
          flutter precache --ios

      - name: Patch Flutter
        shell: bash
        run: |
          set -euxo pipefail

          FLUTTER_ROOT="$(dirname "$(dirname "$(which flutter)")")"
          PATCH_FILE="${GITHUB_WORKSPACE}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"

          echo "Flutter root: ${FLUTTER_ROOT}"
          echo "Patch file: ${PATCH_FILE}"

          if [[ "${FLUTTER_VERSION}" == "3.24.5" ]] && [[ -f "${PATCH_FILE}" ]]; then
            cd "${FLUTTER_ROOT}"

            if git apply --check "${PATCH_FILE}"; then
              git apply "${PATCH_FILE}"
              echo "Flutter patch applied."
            elif git apply --reverse --check "${PATCH_FILE}"; then
              echo "Flutter patch is already applied."
            else
              echo "Flutter patch cannot be applied."
              exit 1
            fi
          else
            echo "Flutter patch is not required or patch file is missing."
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.IOS_RUST_TARGET }}
          components: rustfmt

      - name: Show Rust information
        shell: bash
        run: |
          set -euxo pipefail

          rustup show
          rustc --version
          cargo --version
          rustup target add "${IOS_RUST_TARGET}"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rustdesk-ios
          key: ${{ env.IOS_RUST_TARGET }}
          cache-on-failure: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install iOS vcpkg dependencies
        shell: bash
        run: |
          set -euxo pipefail

          echo "VCPKG_ROOT=${VCPKG_ROOT}"

          if ! "${VCPKG_ROOT}/vcpkg" install \
            --triplet "${IOS_VCPKG_TRIPLET}" \
            --x-install-root="${VCPKG_ROOT}/installed"; then

            echo "vcpkg installation failed."

            find "${VCPKG_ROOT}" \
              -type f \
              \( -name "*.log" -o -name "*out.log" -o -name "*err.log" \) \
              -print \
              -exec sh -c 'echo "===== $1 ====="; tail -n 300 "$1"' _ {} \;

            exit 1
          fi

          "${VCPKG_ROOT}/vcpkg" list

      - name: Restore generated bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Verify project structure
        shell: bash
        run: |
          set -euxo pipefail

          test -f Cargo.toml
          test -f flutter/pubspec.yaml
          test -d flutter/ios

          echo "Root files:"
          ls -la

          echo "Flutter directory:"
          ls -la flutter

          echo "iOS directory:"
          ls -la flutter/ios

      - name: Build Rust static library for iOS
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          set -euxo pipefail

          rustup target add "${IOS_RUST_TARGET}"

          cargo build \
            --features flutter,hwcodec \
            --release \
            --target "${IOS_RUST_TARGET}" \
            --lib

          RUST_LIBRARY="target/${IOS_RUST_TARGET}/release/liblibrustdesk.a"

          if [[ ! -f "${RUST_LIBRARY}" ]]; then
            echo "Rust static library was not created."
            find target -maxdepth 5 -type f -print || true
            exit 1
          fi

          ls -lh "${RUST_LIBRARY}"
          file "${RUST_LIBRARY}"

      - name: Copy Rust library into Flutter iOS project
        shell: bash
        run: |
          set -euxo pipefail

          RUST_LIBRARY="target/${IOS_RUST_TARGET}/release/liblibrustdesk.a"

          mkdir -p flutter/ios/Runner

          cp \
            "${RUST_LIBRARY}" \
            flutter/ios/Runner/liblibrustdesk.a

          ls -lh flutter/ios/Runner/liblibrustdesk.a
          file flutter/ios/Runner/liblibrustdesk.a

      - name: Install Flutter packages
        working-directory: flutter
        shell: bash
        run: |
          set -euxo pipefail

          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Install CocoaPods dependencies
        working-directory: flutter/ios
        shell: bash
        run: |
          set -euxo pipefail

          if [[ ! -f "Podfile" ]]; then
            echo "Podfile not found in flutter/ios."
            ls -la
            exit 1
          fi

          pod repo update
          pod install --repo-update

          test -d Runner.xcworkspace
          ls -la Runner.xcworkspace

      - name: Disable iOS code signing
        shell: bash
        run: |
          set -euxo pipefail

          PROJECT_FILE="flutter/ios/Runner.xcodeproj/project.pbxproj"

          if [[ ! -f "${PROJECT_FILE}" ]]; then
            echo "Xcode project file not found: ${PROJECT_FILE}"
            exit 1
          fi

          sed -i '' \
            's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            "${PROJECT_FILE}" || true

          sed -i '' \
            's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' \
            "${PROJECT_FILE}" || true

          sed -i '' \
            's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' \
            "${PROJECT_FILE}" || true

      - name: Build unsigned iOS application
        working-directory: flutter
        shell: bash
        run: |
          set -euxo pipefail

          flutter build ios \
            --release \
            --no-codesign

          APP_PATH="build/ios/iphoneos/Runner.app"

          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Runner.app was not created."

            find build/ios \
              -maxdepth 6 \
              -type d \
              -name "*.app" \
              -print || true

            exit 1
          fi

          ls -la "${APP_PATH}"

      - name: Create unsigned IPA
        working-directory: flutter
        shell: bash
        run: |
          set -euxo pipefail

          APP_PATH="build/ios/iphoneos/Runner.app"
          OUTPUT_DIRECTORY="build/ios/ipa"
          PAYLOAD_DIRECTORY="${OUTPUT_DIRECTORY}/Payload"
          IPA_FILE="${OUTPUT_DIRECTORY}/rustdesk-${VERSION}-ios-unsigned.ipa"

          rm -rf "${OUTPUT_DIRECTORY}"
          mkdir -p "${PAYLOAD_DIRECTORY}"

          cp -R "${APP_PATH}" "${PAYLOAD_DIRECTORY}/RustDesk.app"

          pushd "${OUTPUT_DIRECTORY}"
          zip -qry "$(basename "${IPA_FILE}")" Payload
          popd

          if [[ ! -f "${IPA_FILE}" ]]; then
            echo "Unsigned IPA was not created."
            exit 1
          fi

          ls -lh "${IPA_FILE}"
          shasum -a 256 "${IPA_FILE}" | tee "${IPA_FILE}.sha256"

      - name: Show iOS build output
        if: always()
        shell: bash
        run: |
          echo "Rust build files:"
          find "target/${IOS_RUST_TARGET}/release" \
            -maxdepth 2 \
            -type f \
            -print 2>/dev/null || true

          echo "Flutter iOS build files:"
          find flutter/build/ios \
            -maxdepth 6 \
            -type f \
            -print 2>/dev/null || true

      - name: Upload Rust iOS static library
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ env.VERSION }}-ios-static-library
          path: target/${{ env.IOS_RUST_TARGET }}/release/liblibrustdesk.a
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

      - name: Upload unsigned IPA
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ env.VERSION }}-ios-unsigned
          path: |
            flutter/build/ios/ipa/*.ipa
            flutter/build/ios/ipa/*.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Publish unsigned IPA to GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish-release }}
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          draft: false
          generate_release_notes: false
          tag_name: ${{ inputs.upload-tag }}
          name: RustDesk ${{ env.VERSION }} iOS unsigned
          files: |
            flutter/build/ios/ipa/*.ipa
            flutter/build/ios/ipa/*.sha256
          fail_on_unmatched_files: true
